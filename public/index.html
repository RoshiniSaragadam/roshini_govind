<!DOCTYPE html>
<html>

<head>
    <title>Image Gallery</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: #f4f6f9;
        }

        header {
            background: #1e293b;
            color: white;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
        }

        .container {
            padding: 30px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .image-container {
            width: 100%;
            height: 180px;
            overflow: hidden;
            background: #eee;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-body {
            padding: 10px;
            text-align: center;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #1d4ed8;
        }

        .empty {
            text-align: center;
            color: #888;
            margin-top: 50px;
        }

        .loader {
            text-align: center;
            margin-top: 50px;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <header>
        📸 Image Gallery
    </header>

    <div class="container">
        <div id="status" class="loader">Loading images...</div>
        <div id="gallery" class="gallery"></div>
    </div>

    <script>
        const API = "http://localhost:5000/api";

        // 📥 Load thumbnails
        async function loadImages() {
            const status = document.getElementById("status");
            const gallery = document.getElementById("gallery");

            try {
                const res = await fetch(`${API}/thumbnails`);
                const data = await res.json();

                gallery.innerHTML = "";
                status.innerHTML = "";

                if (!data.length) {
                    status.innerHTML = "No images found 📭";
                    return;
                }

                data.forEach(item => {
                    const div = document.createElement("div");
                    div.className = "card";

                    div.innerHTML = `
                <div class="image-container">
                    <img src="${item.thumbnailUrl}" />
                </div>
                <div class="card-body">
                    <button onclick="download('${item.originalUrl}')">
                        ⬇ Download
                    </button>
                </div>
            `;

                    gallery.appendChild(div);
                });

            } catch (err) {
                status.innerHTML = "Failed to load images ❌";
            }
        }

        // 📥 Download original image
        function download(url) {
            const a = document.createElement("a");
            a.href = url;
            a.target = "_blank"
            a.download = "";
            document.body.appendChild(a);
            a.click();
            a.remove();
        }

        // initial load
        loadImages();
    </script>

</body>

</html>
