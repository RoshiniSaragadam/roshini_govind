<!DOCTYPE html>
<html>

<head>
    <title>Image Gallery</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: #f4f6f9;
        }

        header {
            background: #1e293b;
            color: white;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
        }

        .container {
            padding: 30px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .image-container {
            width: 100%;
            height: 180px;
            overflow: hidden;
            background: #eee;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-body {
            padding: 10px;
            text-align: center;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #1d4ed8;
        }

        .empty {
            text-align: center;
            color: #888;
            margin-top: 50px;
        }

        .loader {
            text-align: center;
            margin-top: 50px;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <header>
        📸 Image Gallery
    </header>

    <div class="container">
        <div id="status" class="loader">Loading images...</div>
        <div id="gallery" class="gallery"></div>
        <div id="empty" class="empty"></div>
    </div>
    <script>
        // const API = "http://localhost:5000/api";
        const API = window.location.origin + "/api";

        // 📥 Load thumbnails
        let page = 1;
        const limit = 10;
        let isLoading = false;
        let hasMore = true;

        window.addEventListener("scroll", () => {
            const scrollTop = window.scrollY;
            const windowHeight = window.innerHeight;
            const fullHeight = document.body.scrollHeight;

            // load more when near bottom
            if (scrollTop + windowHeight >= fullHeight - 100) {
                loadImages();
            }
        });

        async function loadImages() {
            if (isLoading || !hasMore) return;

            const gallery = document.getElementById("gallery");
            const loader = document.getElementById("status");
            const empty = document.getElementById("empty");

            isLoading = true;
            loader.style.display = "block";

            try {
                const res = await fetch(`${API}/thumbnails?page=${page}&limit=${limit}`);
                const data = await res.json();

                loader.style.display = "none";

                // ❌ no more data
                if (!data.length) {
                    hasMore = false;

                    if (page === 1) {
                        empty.innerText = "No images found 📭";
                    }

                    return;
                }

                empty.innerText = "";

                // ✅ append (not replace)
                data.forEach(item => {
                    const div = document.createElement("div");
                    div.className = "card";

                    div.innerHTML = `
                <img src="${item.thumbnailUrl}" />
                <div class="card-body">
                    <button onclick="download('${item.originalUrl}')">
                        ⬇ Download
                    </button>
                </div>
            `;

                    gallery.appendChild(div);
                });

                page++; // next page

            } catch (err) {
                loader.innerText = "Failed to load images ❌";
            }

            isLoading = false;
        }
        // 📥 Download original

        function download(originalUrl) {
            const key = originalUrl.split(".amazonaws.com/")[1];

            window.open(`${API}/download?key=${key}`, "_blank");
        }

        // initial load
        loadImages();

        function nextPage() {
            page++;
            updatePage();
            loadImages();
        }

        function prevPage() {
            if (page > 1) page--;
            updatePage();
            loadImages();
        }

        function updatePage() {
            document.getElementById("pageNumber").innerText = `Page ${page}`;
        }
    </script>

</body>

</html>
